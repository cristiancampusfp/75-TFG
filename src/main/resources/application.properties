# ==========================================
# 1. Base de Datos (Seguridad por Entorno)
# ==========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fitness_db}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 2. JPA & Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# 3. Seguridad JWT
# ==========================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ==========================================
# 4. Configuración de Inteligencia Artificial (Gemini)
# ==========================================
# Usamos el modelo 2.5-flash que es el que tienes en tu código
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
# La clave se cargará desde la variable de entorno GEMINI_API_KEY en IntelliJ
gemini.api.key=${GEMINI_API_KEY:}

# ==========================================
# 5. Ajustes de Formato y Codificación
# ==========================================
# Evita que las fechas se envíen como números raros al frontend
spring.jackson.serialization.write-dates-as-timestamps=false
# Forzamos UTF-8 para evitar problemas con tildes y eńes
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ==========================================
# 6. Servidor y Logging (Preparado para Producción)
# ==========================================
server.port=8080
logging.level.root=INFO
# ? SILENCIAMOS EL MODO DEBUG PARA EVITAR FUGAS DE DATOS EN PRODUCCIÓN
logging.level.com.fitness=INFO
logging.level.org.springframework.security=WARN