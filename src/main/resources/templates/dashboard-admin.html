<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Gestión Total PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ==========================================
           TEMA PREMIUM: MIDNIGHT BLUE - ADMIN
           ========================================== */
        body {
            background: linear-gradient(135deg, #0B132B 0%, #040711 100%);
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        /* Barra de navegación */
        .navbar {
            background-color: rgba(28, 37, 65, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; color: #ffffff !important; }

        /* Contenedor Principal (Reemplaza al bg-white) */
        .card-panel {
            background-color: #1C2541 !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            padding: 2rem;
            margin-top: 2rem;
        }

        /* Textos */
        h1, h2, h3, h4, h5, h6 { color: #ffffff; font-weight: 700; }
        .text-muted { color: #a0aec0 !important; }

        /* Pestañas (Nav Tabs) */
        .nav-tabs {
            border-bottom: 2px solid #2A3B5C;
            margin-bottom: 1.5rem;
        }
        .nav-tabs .nav-link {
            color: #a0aec0;
            border: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }
        .nav-tabs .nav-link:hover {
            color: #ffffff;
            background-color: rgba(58, 134, 255, 0.1);
            border-radius: 10px 10px 0 0;
        }
        .nav-tabs .nav-link.active {
            background-color: #3A86FF !important;
            color: #ffffff !important;
            border: none;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 -4px 15px rgba(58, 134, 255, 0.3);
        }

        /* Botones */
        .btn-primary { background-color: #3A86FF; border: none; font-weight: bold; }
        .btn-primary:hover { background-color: #4CC9F0; box-shadow: 0 4px 15px rgba(76, 201, 240, 0.4); transform: translateY(-2px); }
        .btn-success { background-color: #06d6a0; border: none; color: #0B132B; font-weight: bold; }
        .btn-success:hover { background-color: #05b586; transform: translateY(-2px); }
        .btn-danger { background-color: #ef476f; border: none; }
        .btn-warning { background-color: #ffd166; border: none; color: #0B132B; font-weight: bold; }
        .btn-outline-danger { color: #ef476f; border-color: #ef476f; }
        .btn-outline-danger:hover { background-color: #ef476f; color: #ffffff; }
        .btn-outline-light:hover { color: #0B132B; }

        /* Tablas */
        .table { color: #e2e8f0; --bs-table-bg: transparent; margin-bottom: 0; }
        .table-dark th { background-color: #2A3B5C !important; color: #4CC9F0 !important; border-bottom: none; font-size: 1.05rem; }
        .table-striped>tbody>tr:nth-of-type(odd)>* { color: #e2e8f0; }
        .table-hover>tbody>tr:hover>* { color: #ffffff; background-color: rgba(255,255,255,0.05); }
        td, th { border-color: #2A3B5C !important; padding: 15px 10px; }

        /* Badges */
        .badge.bg-secondary { background-color: #2A3B5C !important; color: #4CC9F0 !important; border: 1px solid #4CC9F0; }
        .badge.bg-info { background-color: #3A86FF !important; color: #ffffff !important; }

        /* Inputs y Selects */
        .form-control, .form-select, textarea {
            background-color: #0B132B !important;
            border: 1px solid #2A3B5C !important;
            color: #ffffff !important;
        }
        .form-control:focus, .form-select:focus, textarea:focus {
            border-color: #3A86FF !important;
            box-shadow: 0 0 0 0.25rem rgba(58, 134, 255, 0.25) !important;
        }
        .form-select option { background-color: #0B132B; color: #ffffff; }
        .form-label { color: #a0aec0; font-weight: 500; }

        /* Modales */
        .modal-content { background-color: #1C2541; border: 1px solid #3A86FF; color: #ffffff; border-radius: 15px; }
        .modal-header { border-bottom: 1px solid #2A3B5C; }
        .modal-footer { border-top: 1px solid #2A3B5C; }
        .btn-close-white { filter: invert(1) grayscale(100%) brightness(200%); }
        .modal-header.bg-warning { background-color: #ffd166 !important; color: #0B132B !important; border-bottom: none; }
        .modal-header.bg-warning .modal-title { color: #0B132B; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4 shadow">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">⚡ Panel de Administrador PRO</span>
        <button class="btn btn-outline-light btn-sm fw-bold" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>
</nav>

<div class="container card-panel">

    <ul class="nav nav-tabs" id="adminTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="ejercicios-tab" data-bs-toggle="tab" data-bs-target="#ejercicios" type="button" role="tab">🏋️ Catálogo de Ejercicios</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="usuarios-tab" data-bs-toggle="tab" data-bs-target="#usuarios" type="button" role="tab">👥 Gestión de Usuarios</button>
        </li>
    </ul>

    <div class="tab-content" id="adminTabsContent">

        <div class="tab-pane fade show active" id="ejercicios" role="tabpanel">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Catálogo de Ejercicios</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCrearEjercicio">
                    + Añadir Nuevo Ejercicio
                </button>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle text-center">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Grupo Muscular</th>
                        <th>Dificultad</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaEjerciciosBody">
                    <tr><td colspan="5" class="text-center py-4 text-muted">Cargando ejercicios...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="usuarios" role="tabpanel">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Clientes Registrados</h2>
                <div>
                    <button class="btn btn-primary me-2" data-bs-toggle="modal" data-bs-target="#modalCrearUsuario">
                        + Añadir Usuario
                    </button>
                    <button class="btn btn-success" onclick="cargarUsuarios()">
                        🔄 Refrescar
                    </button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle text-center">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Nivel</th>
                        <th>Objetivo</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaUsuariosBody">
                    <tr><td colspan="6" class="text-center py-4 text-muted">Cargando usuarios...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<div class="modal fade" id="modalCrearEjercicio" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white border-0">
                <h5 class="modal-title fw-bold">Registrar Ejercicio</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formCrearEjercicio">
                    <div class="mb-3">
                        <label class="form-label">Nombre del Ejercicio *</label>
                        <input type="text" id="ejNombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="ejDescripcion" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Grupo Muscular *</label>
                            <select id="ejGrupo" class="form-select" required>
                                <option value="Pecho">Pecho</option>
                                <option value="Espalda">Espalda</option>
                                <option value="Pierna">Pierna</option>
                                <option value="Brazo">Brazo</option>
                                <option value="Core">Core</option>
                                <option value="Cardio">Cardio</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Dificultad *</label>
                            <select id="ejDificultad" class="form-select" required>
                                <option value="Principiante">Principiante</option>
                                <option value="Intermedio">Intermedio</option>
                                <option value="Avanzado">Avanzado</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">URL del Vídeo (Opcional)</label>
                        <input type="url" id="ejVideo" class="form-control" placeholder="https://youtube.com/...">
                    </div>
                    <button type="submit" class="btn btn-success w-100 fs-5">💾 Guardar Ejercicio</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalCrearUsuario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white border-0">
                <h5 class="modal-title fw-bold">Registrar Nuevo Cliente</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formCrearUsuario">
                    <div class="mb-3">
                        <label class="form-label">Nombre Completo *</label>
                        <input type="text" id="newUserNombre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico *</label>
                        <input type="email" id="newUserEmail" class="form-control" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Objetivo *</label>
                            <select id="newUserObjetivo" class="form-select" required>
                                <option value="Perder Peso">Perder Peso</option>
                                <option value="Ganar Masa Muscular">Ganar Masa Muscular</option>
                                <option value="Mantenimiento">Mantenimiento</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nivel *</label>
                            <select id="newUserNivel" class="form-select" required>
                                <option value="Principiante">Principiante</option>
                                <option value="Intermedio">Intermedio</option>
                                <option value="Avanzado">Avanzado</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Contraseña Temporal *</label>
                        <input type="text" id="newUserPassword" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold fs-5">Crear Cuenta de Usuario</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEditarUsuario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content" style="border-color: #ffd166;">
            <div class="modal-header bg-warning text-dark border-0">
                <h5 class="modal-title fw-bold">✏️ Editar Usuario</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formEditarUsuario">
                    <input type="hidden" id="editUserId">
                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" id="editUserNombre" class="form-control" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Objetivo</label>
                            <select id="editUserObjetivo" class="form-select">
                                <option value="Perder Peso">Perder Peso</option>
                                <option value="Ganar Masa Muscular">Ganar Masa Muscular</option>
                                <option value="Mantenimiento">Mantenimiento</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nivel</label>
                            <select id="editUserNivel" class="form-select">
                                <option value="Principiante">Principiante</option>
                                <option value="Intermedio">Intermedio</option>
                                <option value="Avanzado">Avanzado</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold mt-2 fs-5">💾 Actualizar Datos</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const token = localStorage.getItem('jwtToken');
    if(!token) {
        window.location.href = '/login';
    }

    function cargarEjercicios() {
        fetch('/api/ejercicios', {
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token }
        })
            .then(response => {
                if(response.status === 403) {
                    alert("No tienes permisos para ver esto.");
                    window.location.href = '/login';
                    throw new Error("Prohibido");
                }
                return response.json();
            })
            .then(data => {
                const tbody = document.getElementById('tablaEjerciciosBody');
                tbody.innerHTML = '';

                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">Aún no hay ejercicios registrados.</td></tr>';
                    return;
                }

                data.forEach(ej => {
                    tbody.innerHTML += `
                    <tr>
                        <td><span class="text-muted">#${ej.id}</span></td>
                        <td class="fw-bold text-white">${ej.nombre}</td>
                        <td><span class="badge bg-secondary px-3 py-2">${ej.grupoMuscular}</span></td>
                        <td>${ej.dificultad}</td>
                        <td>
                            <button class="btn btn-outline-danger btn-sm fw-bold" onclick="borrarEjercicio(${ej.id})">Borrar</button>
                        </td>
                    </tr>
                `;
                });
            })
            .catch(error => console.error("Error al cargar:", error));
    }

    document.getElementById('formCrearEjercicio').addEventListener('submit', function(e) {
        e.preventDefault();

        const nuevoEjercicio = {
            nombre: document.getElementById('ejNombre').value,
            descripcion: document.getElementById('ejDescripcion').value,
            grupoMuscular: document.getElementById('ejGrupo').value,
            dificultad: document.getElementById('ejDificultad').value,
            tipoEjercicio: "Fuerza",
            urlVideo: document.getElementById('ejVideo').value
        };

        fetch('/api/ejercicios', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(nuevoEjercicio)
        })
            .then(response => {
                if(response.ok) {
                    document.getElementById('formCrearEjercicio').reset();
                    const modal = bootstrap.Modal.getInstance(document.getElementById('modalCrearEjercicio'));
                    modal.hide();
                    cargarEjercicios();
                } else {
                    alert('Error al guardar. Asegúrate de ser Administrador.');
                }
            });
    });

    function borrarEjercicio(id) {
        if(confirm('¿Seguro que deseas eliminar este ejercicio permanentemente?')) {
            fetch('/api/ejercicios/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(response => {
                    if(response.ok) cargarEjercicios();
                    else alert("Error al borrar.");
                });
        }
    }

    function cargarUsuarios() {
        fetch('/api/admin/usuarios', {
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token }
        })
            .then(response => {
                if(!response.ok) throw new Error("Error al cargar usuarios");
                return response.json();
            })
            .then(data => {
                const tbody = document.getElementById('tablaUsuariosBody');
                tbody.innerHTML = '';

                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No hay clientes registrados.</td></tr>';
                    return;
                }

                data.forEach(user => {
                    const btnEditar = `<button class="btn btn-warning btn-sm me-1 fw-bold" onclick="abrirModalEditar(${user.id}, '${user.nombre}', '${user.objetivo || ''}', '${user.nivelExperiencia || ''}')">Editar</button>`;
                    const btnBorrar = `<button class="btn btn-outline-danger btn-sm fw-bold" onclick="borrarUsuario(${user.id})">Banear</button>`;

                    tbody.innerHTML += `
                    <tr>
                        <td><span class="text-muted">#${user.id}</span></td>
                        <td class="fw-bold text-white">${user.nombre}</td>
                        <td class="text-primary">${user.email}</td>
                        <td><span class="badge bg-info text-white px-2 py-1">${user.nivelExperiencia || 'N/A'}</span></td>
                        <td>${user.objetivo || 'N/A'}</td>
                        <td>${btnEditar} ${btnBorrar}</td>
                    </tr>
                `;
                });
            })
            .catch(error => console.error("Error:", error));
    }

    document.getElementById('formCrearUsuario').addEventListener('submit', function(e) {
        e.preventDefault();

        const nuevoUsuario = {
            nombre: document.getElementById('newUserNombre').value,
            email: document.getElementById('newUserEmail').value,
            password: document.getElementById('newUserPassword').value,
            objetivo: document.getElementById('newUserObjetivo').value,
            nivelExperiencia: document.getElementById('newUserNivel').value
        };

        fetch('/api/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(nuevoUsuario)
        })
            .then(response => {
                if(response.ok) {
                    document.getElementById('formCrearUsuario').reset();
                    const modal = bootstrap.Modal.getInstance(document.getElementById('modalCrearUsuario'));
                    modal.hide();
                    cargarUsuarios();
                    alert("Usuario creado con éxito.");
                } else {
                    response.text().then(text => alert("Error al crear usuario: " + text));
                }
            })
            .catch(error => console.error("Error:", error));
    });

    function borrarUsuario(id) {
        if(confirm('⚠️ ¡Atención! ¿Estás seguro de que deseas eliminar a este usuario de la base de datos? Esto borrará también sus rutinas.')) {
            fetch('/api/admin/usuarios/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            })
                .then(response => {
                    if(response.ok) {
                        alert("Usuario eliminado correctamente.");
                        cargarUsuarios();
                    } else {
                        alert("Error al eliminar el usuario.");
                    }
                });
        }
    }

    let modalEditarInstancia;

    function abrirModalEditar(id, nombre, objetivo, nivel) {
        document.getElementById('editUserId').value = id;
        document.getElementById('editUserNombre').value = nombre;
        if(objetivo) document.getElementById('editUserObjetivo').value = objetivo;
        if(nivel) document.getElementById('editUserNivel').value = nivel;

        const modalElement = document.getElementById('modalEditarUsuario');
        if (!modalEditarInstancia) {
            modalEditarInstancia = new bootstrap.Modal(modalElement);
        }
        modalEditarInstancia.show();
    }

    document.getElementById('formEditarUsuario').addEventListener('submit', function(e) {
        e.preventDefault();

        const id = document.getElementById('editUserId').value;
        const datosActualizados = {
            nombre: document.getElementById('editUserNombre').value,
            objetivo: document.getElementById('editUserObjetivo').value,
            nivelExperiencia: document.getElementById('editUserNivel').value
        };

        fetch('/api/admin/usuarios/' + id, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(datosActualizados)
        })
            .then(response => {
                if(response.ok) {
                    modalEditarInstancia.hide();
                    cargarUsuarios();
                    alert("Usuario actualizado con éxito.");
                } else {
                    alert("Error al actualizar el usuario.");
                }
            });
    });

    function cerrarSesion() {
        localStorage.removeItem('jwtToken');
        localStorage.removeItem('usuarioDatos');
        window.location.href = '/login';
    }

    cargarEjercicios();
    cargarUsuarios();
</script>
</body>
</html>
