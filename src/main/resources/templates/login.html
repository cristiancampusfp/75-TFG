<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - FitnessApp PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ==========================================
           TEMA PREMIUM: MIDNIGHT BLUE
           ========================================== */
        body {
            /* Fondo degradado oscuro elegante */
            background: linear-gradient(135deg, #0B132B 0%, #040711 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* Tarjeta de Login */
        .card-login {
            width: 100%;
            max-width: 420px;
            background-color: #1C2541; /* Azul marino profundo */
            border: 1px solid rgba(255, 255, 255, 0.05); /* Borde sutil */
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            padding: 2.5rem !important;
            backdrop-filter: blur(10px);
        }

        /* Título */
        .card-login h2 {
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
        }

        /* Textos y Labels */
        .form-label {
            color: #a0aec0; /* Gris azulado claro */
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Inputs (Cajas de texto) */
        .form-control {
            background-color: #0B132B; /* Fondo oscuro */
            border: 1px solid #2A3B5C;
            color: #ffffff;
            border-radius: 10px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }

        /* Efecto al hacer clic en el Input */
        .form-control:focus {
            background-color: #0B132B;
            color: #ffffff;
            border-color: #3A86FF; /* Azul eléctrico */
            box-shadow: 0 0 0 0.25rem rgba(58, 134, 255, 0.25);
        }

        /* Parche para el autocompletado de Chrome (que no se ponga blanco) */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #0B132B inset !important;
            -webkit-text-fill-color: white !important;
        }

        /* Botón Principal */
        .btn-primary {
            background-color: #3A86FF; /* Azul eléctrico vibrante */
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        /* Efecto Hover del Botón */
        .btn-primary:hover {
            background-color: #4CC9F0; /* Cian brillante */
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(76, 201, 240, 0.4);
        }

        /* Enlaces */
        .text-decoration-none {
            color: #4CC9F0;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        .text-decoration-none:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card card-login">
        <h2 class="text-center mb-4">⚡ Iniciar Sesión</h2>

        <div id="alerta" class="alert d-none fw-bold text-center" role="alert"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-4">ENTRAR</button>
            <div class="text-center">
                <a href="/register" class="text-decoration-none">¿No tienes cuenta? Regístrate aquí</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const datos = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const alerta = document.getElementById('alerta');

        fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(datos)
        })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    return response.text().then(text => { throw new Error(text) });
                }
            })
            .then(data => {
                localStorage.setItem('jwtToken', data.token);
                localStorage.setItem('usuarioDatos', JSON.stringify(data.usuario));

                alerta.className = 'alert alert-success mt-3';
                alerta.textContent = '¡Bienvenido ' + data.usuario.nombre + '! Accediendo...';
                alerta.classList.remove('d-none');

                setTimeout(() => {
                    if (data.usuario.rol === 'ADMIN') {
                        window.location.href = '/dashboard-admin';
                    } else {
                        window.location.href = '/dashboard-cliente';
                    }
                }, 1500);
            })
            .catch(error => {
                alerta.className = 'alert alert-danger mt-3';
                alerta.textContent = error.message || 'Credenciales incorrectas';
                alerta.classList.remove('d-none');
            });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
